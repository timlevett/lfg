# LFG hook config for OpenAI Codex CLI (with boopifier)
# Copy to ~/.codex/config.toml (or merge into existing config)

[[hooks.pre_tool_use]]
command = "boopifier -c ~/.config/lfg/boopifier-codex.json"

[[hooks.post_tool_use]]
command = "boopifier -c ~/.config/lfg/boopifier-codex.json"

[[hooks.session_start]]
command = "boopifier -c ~/.config/lfg/boopifier-codex.json"

[[hooks.stop]]
command = "boopifier -c ~/.config/lfg/boopifier-codex.json"
